<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Enraizados">
<meta name="theme-color" content="#1E2A08">
<meta name="description" content="Sistema de Gestão — Ministério Evangélico Enraizados">
<title>Ministério Evangélico Enraizados</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Inter:wght@300;400;500;600;700&family=Great+Vibes&family=Crimson+Text:wght@400;600;700&display=swap" rel="stylesheet">

<!-- PWA Manifest inline -->
<script>
const manifest = {
  name: "Ministério Evangélico Enraizados",
  short_name: "Enraizados",
  description: "Sistema de Gestão da Igreja",
  start_url: ".",
  display: "standalone",
  background_color: "#1E2A08",
  theme_color: "#1E2A08",
  orientation: "any",
  icons: [{
    src: "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 512 512'%3E%3Crect width='512' height='512' rx='80' fill='%233D4A1A'/%3E%3Ctext x='256' y='320' font-size='280' text-anchor='middle' fill='%23C49A2A'%3E✝%3C/text%3E%3C/svg%3E",
    sizes: "512x512", type: "image/svg+xml", purpose: "any maskable"
  }]
};
const blob = new Blob([JSON.stringify(manifest)], {type:'application/json'});
const link = document.createElement('link');
link.rel = 'manifest';
link.href = URL.createObjectURL(blob);
document.head.appendChild(link);
</script>

<style>
/* ═══════════════════════════ TOKENS ═══════════════════════════ */
:root{
  --o900:#1E2A08;--o800:#2C3F0D;--o700:#3D4A1A;--o600:#4E5F22;
  --o500:#5C6B2E;--o400:#7A8C40;--o300:#9AAD5A;--o200:#BDD088;
  --o100:#DEE9BB;--o50:#F2F7E8;
  --g900:#C49A2A;--g800:#D4AB38;--g700:#E8C96A;
  --black:#0F1409;--gray900:#1C1C1C;--gray800:#2C2C2C;
  --gray500:#888;--white:#FDFCF8;
  --red:#8B2A2A;--red-light:#D96060;
  --green-t:#4CAF50;--blue-t:#5B9BD5;
  --r4:4px;--r6:6px;--r8:8px;--r10:10px;--r14:14px;--r20:20px;
  --sh-sm:0 1px 4px rgba(0,0,0,.2);
  --sh-md:0 4px 20px rgba(0,0,0,.3);
  --sh-lg:0 12px 48px rgba(0,0,0,.45);
  --sh-xl:0 24px 80px rgba(0,0,0,.65);
  --t:.18s ease;
  /* safe areas for notch/home bar */
  --sat: env(safe-area-inset-top, 0px);
  --sab: env(safe-area-inset-bottom, 0px);
  --sal: env(safe-area-inset-left, 0px);
  --sar: env(safe-area-inset-right, 0px);
  /* bottom nav height + safe area */
  --bnav: 60px;
  --bnav-total: calc(var(--bnav) + var(--sab));
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{height:100%;overflow-x:hidden}
body{
  font-family:'Inter',sans-serif;background:var(--o700);color:var(--white);
  min-height:100%;min-height:100dvh;font-size:14px;line-height:1.5;
  -webkit-font-smoothing:antialiased;overflow-x:hidden;
}
input,select,textarea,button{font-family:'Inter',sans-serif;font-size:16px; /* 16px prevents iOS zoom */}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--o400);border-radius:4px}
img{display:block;max-width:100%}
/* prevent text selection on buttons */
button{-webkit-user-select:none;user-select:none;cursor:pointer}

/* ═══════════════════════════ TOAST ═══════════════════════════ */
#toast{
  position:fixed;bottom:calc(var(--bnav-total) + 12px);left:50%;
  transform:translateX(-50%) translateY(16px);z-index:9999;
  background:var(--o800);border:1px solid var(--o400);border-radius:var(--r8);
  padding:10px 20px;box-shadow:var(--sh-lg);
  font-size:13px;font-weight:500;color:var(--o200);
  opacity:0;transition:opacity .3s,transform .3s;pointer-events:none;
  white-space:nowrap;display:flex;align-items:center;gap:8px;
}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
@media(min-width:768px){
  #toast{bottom:24px;left:auto;right:24px;transform:translateY(16px)}
  #toast.show{transform:translateY(0)}
}

/* ═══════════════════════════ LOGIN ═══════════════════════════ */
#login-screen{
  min-height:100dvh;display:flex;align-items:center;justify-content:center;
  background:radial-gradient(ellipse at 40% 50%,var(--o800),var(--o900) 60%,#0A0F03);
  padding:max(var(--sat),20px) 20px max(var(--sab),20px);
}
.login-card{
  background:linear-gradient(145deg,rgba(46,59,18,.95),rgba(20,20,20,.98));
  border:1px solid rgba(196,154,42,.25);border-radius:var(--r20);
  padding:clamp(28px,5vw,48px) clamp(20px,5vw,44px) clamp(24px,4vw,40px);
  width:100%;max-width:400px;box-shadow:var(--sh-xl);
  text-align:center;
}
.login-logo{
  width:90px;height:90px;border-radius:50%;border:3px solid rgba(196,154,42,.4);
  background:linear-gradient(135deg,var(--o700),var(--o900));
  display:flex;align-items:center;justify-content:center;
  margin:0 auto 18px;font-size:36px;box-shadow:0 0 32px rgba(196,154,42,.12);
  overflow:hidden;
}
.login-logo img{width:100%;height:100%;object-fit:cover;border-radius:50%}
.login-card h1{
  font-family:'Cinzel',serif;font-size:clamp(15px,4vw,18px);font-weight:700;
  color:var(--g900);text-align:center;letter-spacing:.6px;line-height:1.3;margin-bottom:4px;
}
.login-sub{text-align:center;font-size:10px;color:var(--o300);letter-spacing:3px;text-transform:uppercase;margin-bottom:28px}
.login-div{height:1px;background:linear-gradient(to right,transparent,rgba(196,154,42,.3),transparent);margin-bottom:24px}
.fld{display:flex;flex-direction:column;gap:6px;margin-bottom:16px;text-align:left}
.fld label{font-size:10px;font-weight:700;letter-spacing:1.5px;color:var(--g900);text-transform:uppercase}
.fld input{
  background:rgba(0,0,0,.35);border:1px solid rgba(92,107,46,.4);
  border-radius:var(--r6);padding:13px 14px;color:var(--white);
  outline:none;transition:border-color var(--t),box-shadow var(--t);width:100%;
  -webkit-appearance:none;appearance:none;
}
.fld input:focus{border-color:rgba(196,154,42,.6);box-shadow:0 0 0 3px rgba(196,154,42,.08)}
.fld input::placeholder{color:rgba(168,184,122,.3)}
.login-err{
  background:rgba(139,42,42,.2);border:1px solid rgba(139,42,42,.5);
  border-radius:var(--r6);padding:10px 14px;font-size:13px;color:var(--red-light);
  margin-bottom:14px;display:none;align-items:center;gap:8px;text-align:left;
}
.login-err.show{display:flex}
.login-btn{
  width:100%;padding:14px;background:linear-gradient(135deg,var(--g900),var(--g700));
  border:none;border-radius:var(--r6);font-family:'Cinzel',serif;
  font-size:12px;font-weight:700;letter-spacing:2.5px;color:var(--black);
  transition:all var(--t);box-shadow:0 4px 16px rgba(196,154,42,.2);
  -webkit-appearance:none;appearance:none;
}
.login-btn:hover{filter:brightness(1.05);box-shadow:0 6px 24px rgba(196,154,42,.35)}
.login-btn:active{transform:scale(.98)}
.login-hint{text-align:center;font-size:11px;color:rgba(168,184,122,.3);margin-top:14px}
.login-verse{
  margin-top:20px;padding:12px;border-top:1px solid rgba(196,154,42,.15);
  font-family:'Crimson Text',Georgia,serif;font-style:italic;
  font-size:12px;color:var(--o300);line-height:1.6;text-align:center;
}

/* ═══════════════════════════ APP SHELL ═══════════════════════════ */
#main-app{
  display:flex;flex-direction:column;min-height:100dvh;
  background:linear-gradient(160deg,var(--o800),#1E2A0A 50%,var(--o800));
}

/* ── TOPBAR ── */
.topbar{
  background:linear-gradient(to right,var(--black),var(--o800),var(--black));
  border-bottom:1px solid rgba(196,154,42,.18);
  padding:0 max(var(--sal),16px) 0 max(var(--sal),16px);
  padding-top:var(--sat);
  display:flex;align-items:center;gap:12px;
  min-height:calc(var(--sat) + 64px);
  position:sticky;top:0;z-index:200;
  box-shadow:0 2px 20px rgba(0,0,0,.4);
}
.tb-logo{
  position:relative;width:46px;height:46px;border-radius:50%;
  border:2px solid rgba(196,154,42,.35);overflow:hidden;cursor:pointer;
  flex-shrink:0;background:linear-gradient(135deg,var(--o600),var(--o800));
  display:flex;align-items:center;justify-content:center;
  transition:border-color var(--t);min-width:46px;
}
.tb-logo:active{transform:scale(.95)}
.tb-logo img{width:100%;height:100%;object-fit:cover;border-radius:50%}
.tb-logo .lph{font-size:18px;color:var(--o300)}
.tb-logo .lov{
  position:absolute;inset:0;background:rgba(0,0,0,.5);
  display:flex;align-items:center;justify-content:center;
  opacity:0;transition:opacity var(--t);font-size:14px;
}
.tb-logo:hover .lov{opacity:1}
#logo-file{display:none}
.tb-info{flex:1;min-width:0;overflow:hidden}
.tb-info h1{
  font-family:'Cinzel',serif;font-size:clamp(12px,3.5vw,16px);font-weight:700;
  color:var(--g900);letter-spacing:.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.tb-info p{font-size:9px;color:var(--o300);letter-spacing:2px;text-transform:uppercase;margin-top:1px;white-space:nowrap}
.tb-right{display:flex;align-items:center;gap:6px;flex-shrink:0}
.saldo-chip{
  background:rgba(0,0,0,.25);border:1px solid rgba(92,107,46,.3);
  border-radius:var(--r6);padding:5px 10px;text-align:right;
}
.saldo-chip .lbl{font-size:8px;font-weight:700;color:var(--o300);letter-spacing:2px;text-transform:uppercase;display:block}
.saldo-chip .val{font-family:'Cinzel',serif;font-size:13px;font-weight:700}
.save-ind{display:flex;align-items:center;gap:4px;font-size:9px;color:var(--o400);letter-spacing:1px;opacity:0;transition:opacity .4s}
.save-ind.on{opacity:1}
.save-ind .dot{width:5px;height:5px;border-radius:50%;background:var(--o300);animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.25}}
/* topbar buttons — desktop */
.tbtn{
  background:rgba(92,107,46,.15);border:1px solid rgba(92,107,46,.3);
  border-radius:var(--r6);padding:8px 12px;color:var(--o200);
  font-size:11px;font-weight:600;transition:all var(--t);
  display:flex;align-items:center;gap:5px;white-space:nowrap;
  min-height:40px;
}
.tbtn:hover{background:rgba(92,107,46,.3);color:var(--white)}
.tbtn:active{transform:scale(.96)}
.tbtn-exit{background:rgba(139,42,42,.12);border-color:rgba(139,42,42,.3);color:var(--red-light)}
.tbtn-exit:hover{background:rgba(139,42,42,.25);color:#FF9090}
/* hide labels on small screens, keep icons */
@media(max-width:480px){.tbtn-lbl{display:none}}

/* ── LAYOUT ── */
.layout{display:flex;flex:1;padding-bottom:var(--bnav-total)}
@media(min-width:768px){.layout{padding-bottom:0}}

/* ── SIDEBAR (desktop only) ── */
.sidebar{
  width:220px;flex-shrink:0;
  background:linear-gradient(to bottom,var(--o900),#0F1409);
  border-right:1px solid rgba(92,107,46,.2);
  padding:16px 0;
  position:sticky;top:calc(var(--sat) + 64px);
  height:calc(100dvh - var(--sat) - 64px);
  overflow-y:auto;display:flex;flex-direction:column;
}
@media(max-width:767px){.sidebar{display:none}}
.ssec{margin-bottom:6px}
.ssec-title{
  font-size:9px;font-weight:700;letter-spacing:2.5px;text-transform:uppercase;
  color:rgba(168,184,122,.3);padding:0 16px;margin-bottom:3px;
}
.snav{
  width:100%;background:transparent;border:none;border-left:3px solid transparent;
  padding:9px 16px;display:flex;align-items:center;gap:9px;
  color:var(--o300);font-size:12px;font-weight:400;text-align:left;
  transition:all var(--t);
}
.snav:hover{background:rgba(92,107,46,.1);color:var(--white)}
.snav.active{background:rgba(196,154,42,.07);color:var(--g900);border-left-color:var(--g900);font-weight:600}
.snav .si{font-size:14px;width:18px;text-align:center;flex-shrink:0}
.snav .sl{flex:1}
.snav .sb{background:var(--o600);color:var(--white);border-radius:10px;padding:1px 6px;font-size:9px;font-weight:700}
.snav.active .sb{background:var(--g900);color:var(--black)}
.snav.bday-n.active{color:#F9A825;border-left-color:#F9A825;background:rgba(249,168,37,.06)}
.snav.rep-n.active{color:#7EB8D4;border-left-color:#7EB8D4;background:rgba(126,184,212,.06)}
.sb-foot{margin-top:auto;padding:14px 16px;border-top:1px solid rgba(92,107,46,.12)}
.sb-foot-text{font-size:9px;color:rgba(168,184,122,.22);letter-spacing:1px;text-align:center;line-height:1.7}

/* ── BOTTOM NAV (mobile) ── */
.bnav{
  display:none;position:fixed;bottom:0;left:0;right:0;z-index:300;
  background:linear-gradient(to top,var(--o900),rgba(30,42,8,.97));
  border-top:1px solid rgba(196,154,42,.15);
  padding-bottom:var(--sab);
  box-shadow:0 -4px 20px rgba(0,0,0,.5);
}
@media(max-width:767px){.bnav{display:flex}}
.bnav-inner{display:flex;width:100%;padding:4px 0 2px}
.bnv-btn{
  flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:3px;background:transparent;border:none;
  color:rgba(168,184,122,.45);font-size:9px;font-weight:600;
  letter-spacing:.5px;padding:6px 4px;min-height:var(--bnav);
  transition:all var(--t);position:relative;
}
.bnv-btn:active{transform:scale(.9)}
.bnv-btn .bni{font-size:20px;line-height:1;transition:transform var(--t)}
.bnv-btn .bnl{font-size:8.5px;font-weight:600;letter-spacing:.3px;line-height:1}
.bnv-btn.active{color:var(--g900)}
.bnv-btn.active .bni{transform:scale(1.15)}
.bnv-btn.bday-b.active{color:#F9A825}
.bnv-btn.rep-b.active{color:#7EB8D4}
.bnv-dot{
  position:absolute;top:4px;right:calc(50% - 18px);
  width:8px;height:8px;border-radius:50%;
  background:var(--g900);border:1.5px solid var(--o900);
  font-size:7px;color:var(--black);font-weight:900;
  display:flex;align-items:center;justify-content:center;
}

/* "More" drawer for extra tabs on mobile */
.more-drawer{
  position:fixed;bottom:calc(var(--bnav-total));left:0;right:0;z-index:290;
  background:linear-gradient(to top,var(--o900),rgba(30,42,8,.99));
  border-top:1px solid rgba(196,154,42,.2);
  transform:translateY(100%);transition:transform .25s cubic-bezier(.4,0,.2,1);
  box-shadow:0 -8px 32px rgba(0,0,0,.5);border-radius:var(--r14) var(--r14) 0 0;
  max-height:70vh;overflow-y:auto;
}
.more-drawer.open{transform:translateY(0)}
.drawer-handle{width:36px;height:3px;background:rgba(255,255,255,.15);border-radius:4px;margin:10px auto 4px}
.drawer-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:rgba(92,107,46,.1);padding:2px}
.drawer-item{
  background:var(--o900);display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:6px;
  padding:18px 8px;cursor:pointer;transition:background var(--t);
}
.drawer-item:active{background:rgba(92,107,46,.2)}
.drawer-item.active{background:rgba(196,154,42,.08)}
.drawer-item .di{font-size:24px}
.drawer-item .dl{font-size:11px;font-weight:600;color:var(--o300);letter-spacing:.3px;text-align:center}
.drawer-item.active .dl{color:var(--g900)}
.drawer-overlay{position:fixed;inset:0;z-index:280;display:none}
.drawer-overlay.open{display:block}

/* ── CONTENT ── */
.content{flex:1;padding:16px;min-width:0;overflow:hidden}
@media(min-width:768px){.content{padding:20px}}

/* ── STATS ── */
.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:16px}
@media(min-width:480px){.stats-row{grid-template-columns:repeat(3,1fr)}}
@media(min-width:768px){.stats-row{grid-template-columns:repeat(6,1fr);gap:10px;margin-bottom:18px}}
.stat-card{
  background:linear-gradient(145deg,rgba(46,59,18,.6),rgba(20,20,20,.7));
  border:1px solid rgba(92,107,46,.22);border-radius:var(--r8);
  padding:10px 12px;
}
.stat-card .sv{font-family:'Cinzel',serif;font-size:clamp(13px,3vw,18px);font-weight:700;color:var(--g900);display:block;margin-bottom:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.stat-card .sl{font-size:8px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:var(--o400);display:block}

/* ── PANEL ── */
.panel{
  background:linear-gradient(145deg,rgba(36,48,14,.75),rgba(18,18,18,.85));
  border:1px solid rgba(92,107,46,.22);border-radius:var(--r10);
  overflow:hidden;box-shadow:var(--sh-md);
}
.panel-head{
  background:linear-gradient(to right,rgba(15,20,5,.9),rgba(46,59,18,.6));
  border-bottom:1px solid rgba(196,154,42,.12);
  padding:12px 16px;display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;
}
.ptitle{font-family:'Cinzel',serif;font-size:13px;font-weight:700;color:var(--g900);letter-spacing:.4px;display:flex;align-items:center;gap:8px}
.cpill{background:rgba(92,107,46,.28);color:var(--o200);border-radius:20px;padding:2px 9px;font-size:9px;font-weight:700;border:1px solid rgba(92,107,46,.28)}

/* toolbar */
.toolbar{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.search-inp{
  background:rgba(0,0,0,.28);border:1px solid rgba(92,107,46,.28);
  border-radius:var(--r6);padding:9px 12px;color:var(--white);
  font-size:16px;outline:none;min-width:0;width:100%;max-width:220px;
  -webkit-appearance:none;appearance:none;
  transition:border-color var(--t),box-shadow var(--t);
}
.search-inp:focus{border-color:rgba(196,154,42,.5);box-shadow:0 0 0 3px rgba(196,154,42,.05)}
.search-inp::placeholder{color:rgba(168,184,122,.28)}

/* ── BUTTONS ── */
.btn{
  font-size:12px;font-weight:600;letter-spacing:.5px;
  padding:10px 16px;border:none;border-radius:var(--r6);
  display:inline-flex;align-items:center;gap:6px;white-space:nowrap;
  transition:all var(--t);min-height:42px;
  -webkit-appearance:none;appearance:none;
}
.btn:active{transform:scale(.95)}
.btn-gold{background:linear-gradient(135deg,var(--g900),var(--g700));color:var(--black)}
.btn-gold:hover{filter:brightness(1.08);box-shadow:0 4px 14px rgba(196,154,42,.3)}
.btn-olive{background:linear-gradient(135deg,var(--o500),var(--o400));color:var(--white)}
.btn-olive:hover{filter:brightness(1.1)}
.btn-blue{background:linear-gradient(135deg,#1E5F7A,#2E8BAA);color:var(--white)}
.btn-blue:hover{filter:brightness(1.1);box-shadow:0 4px 14px rgba(46,139,170,.3)}
.btn-green{background:linear-gradient(135deg,#2E7D32,#43A047);color:var(--white)}
.btn-green:hover{filter:brightness(1.1);box-shadow:0 4px 14px rgba(46,125,50,.3)}
.btn-purple{background:linear-gradient(135deg,#6A1B9A,#8E24AA);color:var(--white)}
.btn-purple:hover{filter:brightness(1.1);box-shadow:0 4px 14px rgba(106,27,154,.3)}
.btn-ghost{background:transparent;border:1px solid rgba(92,107,46,.35);color:var(--o300)}
.btn-ghost:hover{border-color:var(--o400);color:var(--white);background:rgba(92,107,46,.15)}
.btn-del{background:transparent;border:1px solid rgba(139,42,42,.3);color:var(--red-light);padding:8px 10px;font-size:11px;min-height:36px}
.btn-del:hover{background:rgba(139,42,42,.18);border-color:var(--red)}
.btn-edt{background:transparent;border:1px solid rgba(92,107,46,.28);color:var(--o300);padding:8px 10px;font-size:11px;margin-right:4px;min-height:36px}
.btn-edt:hover{background:rgba(92,107,46,.18);color:var(--white)}

/* ── FILTER TABS ── */

</head>
<body>

<div id="toast">💾 <span id="toast-msg">Salvo automaticamente</span></div>
<div id="app"></div>

<script>
'use strict';
// ═══ CONSTANTS ═══
const MONTHS=['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
const CATS=['Aluguel / Manutenção','Energia / Água','Som / Mídia','Material de Limpeza','Eventos / Cultos','Missões','Secretaria','Outros'];
const CARGOS=['Pastor','Evangelista','Diácono','Diaconisa','Presbítero','Líder de Louvor','Secretário(a)','Tesoureiro(a)','Outro'];
const NOME_IGREJA='Ministério Evangélico Enraizados';

// ═══ UTILS ═══
const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,6);
const hoje=()=>new Date().toISOString().split('T')[0];
const brl=n=>Number(n||0).toLocaleString('pt-BR',{style:'currency',currency:'BRL'});
const esc=s=>String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const ls=k=>{try{const v=localStorage.getItem(k);return v?JSON.parse(v):null}catch{return null}};
const ss=(k,v)=>{try{localStorage.setItem(k,JSON.stringify(v))}catch{}};

let _toastT=null;
function toast(msg){
  const t=document.getElementById('toast'),m=document.getElementById('toast-msg');
  if(!t||!m)return;
  m.textContent=msg;t.classList.add('show');
  clearTimeout(_toastT);_toastT=setTimeout(()=>t.classList.remove('show'),2400);
}

// ═══ STATE ═══
const ST={
  loggedIn:false,tab:'membros',drawerOpen:false,
  logo:ls('igr-logo')||null,
  membros:ls('igr-membros')||[],
  congregados:ls('igr-congregados')||[],
  obreiros:ls('igr-obreiros')||[],
  entradas:ls('igr-entradas')||[],
  dispensas:ls('igr-dispensas')||[],
  search:{membros:'',congregados:'',obreiros:'',entradas:'',dispensas:''},
  filter:{entradas:'Todos',dispensas:'Todos'},
  bday:{month:new Date().getMonth()},
  report:{tipo:'mensal',mes:new Date().getMonth(),ano:new Date().getFullYear()},
  modal:null,
};

let _saveT=null;
function autoSave(key,msg){
  const data=key==='logo'?ST.logo:ST[key];
  ss('igr-'+key,data);
  toast(msg||'Salvo ✓');
  const ind=document.getElementById('save-ind');
  if(ind){ind.classList.add('on');clearTimeout(_saveT);_saveT=setTimeout(()=>ind&&ind.classList.remove('on'),2000)}
}

// ═══ RENDER ═══
function render(){
  const app=document.getElementById('app');
  if(!ST.loggedIn){app.innerHTML=renderLogin();bindLogin();return}
  const tE=ST.entradas.reduce((s,r)=>s+Number(r.valor||0),0);
  const tD=ST.dispensas.reduce((s,r)=>s+Number(r.valor||0),0);
  const saldo=tE-tD;
  const tm=new Date().getMonth();
  const bdayN=[...ST.membros,...ST.congregados,...ST.obreiros]
    .filter(r=>r.dataNascimento&&parseInt(r.dataNascimento.split('-')[1],10)-1===tm).length;
  app.innerHTML=`
    ${renderTopbar(saldo)}
    <div class="layout">
      ${renderSidebar(bdayN)}
      <div class="content">
        ${renderStats(tE,tD,saldo)}
        ${renderSection()}
        <div class="pg-ft"><span>✝ ${NOME_IGREJA.toUpperCase()} — SISTEMA DE GESTÃO ✝</span></div>
      </div>
    </div>
    ${renderBnav(bdayN)}
    ${renderDrawer()}
    ${ST.drawerOpen?`<div class="drawer-overlay open" onclick="closeDrawer()"></div>`:''}
    ${ST.modal?renderModal():''}
  `;
}

// ═══ LOGIN ═══
function renderLogin(){
  const logoEl=ST.logo?`<img src="${ST.logo}" alt="Logo">`:`✝`;
  return`<div id="login-screen">
    <div class="login-card">
      <div class="login-logo">${logoEl}</div>
      <h1>${NOME_IGREJA}</h1>
      <p class="login-sub">Sistema de Gestão</p>
      <div class="login-div"></div>
      <div id="lerr" class="login-err"><span>⚠</span><span id="lerr-msg"></span></div>
      <div class="fld"><label>Usuário</label><input id="l-u" type="text" placeholder="Digite o usuário" autocomplete="username"></div>
      <div class="fld"><label>Senha</label><input id="l-p" type="password" placeholder="••••••••" autocomplete="current-password"></div>
      <button class="login-btn" onclick="doLogin()">ENTRAR</button>
      <p class="login-hint">Padrão: admin / 1234</p>
      <div class="login-verse">
        "Portanto, assim como vocês receberam Cristo Jesus, o Senhor,<br>
        continuem a viver nele, enraizados e edificados nele,<br>
        firmados na fé, como foram ensinados,<br>
        transbordando de gratidão."<br>
        <strong>— Colossenses 2:6-7</strong>
      </div>
    </div>
  </div>`;
}
function bindLogin(){
  setTimeout(()=>document.getElementById('l-u')?.focus(),100);
  ['l-u','l-p'].forEach(id=>document.getElementById(id)?.addEventListener('keydown',e=>{if(e.key==='Enter')doLogin()}));
}
function doLogin(){
  const u=document.getElementById('l-u')?.value.trim();
  const p=document.getElementById('l-p')?.value;
  const c=ls('igr-credentials')||{usuario:'admin',senha:'1234'};
  if(u===c.usuario&&p===c.senha){ST.loggedIn=true;render()}
  else{const e=document.getElementById('lerr'),m=document.getElementById('lerr-msg');if(e&&m){m.textContent='Usuário ou senha incorretos.';e.classList.add('show')}}
}

// ═══ TOPBAR ═══
function renderTopbar(saldo){
  const logoEl=ST.logo?`<img src="${ST.logo}" alt="Logo">`:`<span class="lph">✝</span>`;
  return`<div class="topbar no-print">
    <div class="tb-logo" onclick="document.getElementById('logo-file').click()" title="Trocar logo">
      ${logoEl}<div class="lov">📷</div>
    </div>
    <input id="logo-file" type="file" accept="image/*" onchange="handleLogo(this)">
    <div class="tb-info">
      <h1>${NOME_IGREJA}</h1>
      <p>Sistema de Gestão</p>
    </div>
    <div class="tb-right">
      <div id="save-ind" class="save-ind"><span class="dot"></span><span>Salvando…</span></div>
      <div class="saldo-chip">
        <span class="lbl">Saldo</span>
        <span class="val" style="color:${saldo>=0?'#6FCF97':'#E88080'}">${brl(saldo)}</span>
      </div>
      <button class="tbtn" onclick="openSettings()">⚙ <span class="tbtn-lbl">Config.</span></button>
      <button class="tbtn tbtn-exit" onclick="confirmExit()">⏻ <span class="tbtn-lbl">Sair</span></button>
    </div>
  </div>`;
}
function handleLogo(input){
  const f=input.files[0];if(!f)return;
  const r=new FileReader();
  r.onload=ev=>{ST.logo=ev.target.result;autoSave('logo','Logo salvo ✓');render()};
  r.readAsDataURL(f);
}
function confirmExit(){if(confirm('Deseja sair do sistema?')){ST.loggedIn=false;ST.modal=null;render()}}

// ═══ SIDEBAR ═══
function renderSidebar(bdayN){
  const nav=(id,icon,label,cls,badge)=>`
    <button class="snav ${cls||''} ${ST.tab===id?'active':''}" onclick="setTab('${id}')">
      <span class="si">${icon}</span><span class="sl">${label}</span>
      ${badge!==undefined?`<span class="sb">${badge}</span>`:''}
    </button>`;
  return`<aside class="sidebar no-print">
    <div class="ssec"><div class="ssec-title">Pessoas</div>
      ${nav('membros','✝','Membros','',ST.membros.length)}
      ${nav('congregados','🕊','Congregados','',ST.congregados.length)}
      ${nav('obreiros','⚓','Obreiros','',ST.obreiros.length)}
    </div>
    <div class="ssec"><div class="ssec-title">Financeiro</div>
      ${nav('entradas','📥','Entradas','')}
      ${nav('dispensas','📤','Dispensas','')}
      ${nav('relatorios','📊','Relatórios','rep-n')}
    </div>
    <div class="ssec"><div class="ssec-title">Agenda</div>
      ${nav('aniversarios','🎂','Aniversariantes','bday-n',bdayN>0?bdayN:undefined)}
    </div>
    <div class="ssec"><div class="ssec-title">Certificados</div>
      ${nav('certificados','📜','Certificados','')}
    </div>
    <div class="sb-foot"><div class="sb-foot-text">✝<br>Enraizados em Cristo<br>Colossenses 2:7</div></div>
  </aside>`;
}

// ═══ BOTTOM NAV (mobile) ═══
const MAIN_TABS=[
  {id:'membros',icon:'✝',label:'Membros',cls:''},
  {id:'entradas',icon:'📥',label:'Entradas',cls:''},
  {id:'certificados',icon:'📜',label:'Certificados',cls:''},
  {id:'aniversarios',icon:'🎂',label:'Aniversário',cls:'bday-b'},
  {id:'__more__',icon:'☰',label:'Mais',cls:''},
];
const MORE_TABS=[
  {id:'congregados',icon:'🕊',label:'Congregados'},
  {id:'obreiros',icon:'⚓',label:'Obreiros'},
  {id:'dispensas',icon:'📤',label:'Saídas'},
  {id:'relatorios',icon:'📊',label:'Relatórios'},
];
function renderBnav(bdayN){
  const buttons=MAIN_TABS.map(t=>{
    if(t.id==='__more__'){
      const anyMoreActive=MORE_TABS.some(m=>m.id===ST.tab);
      return`<button class="bnv-btn ${anyMoreActive?'active':''} ${t.cls}" onclick="toggleDrawer()">
        <span class="bni">${t.icon}</span><span class="bnl">${t.label}</span>
      </button>`;
    }
    const badge=t.id==='aniversarios'&&bdayN>0?`<span class="bnv-dot">${bdayN}</span>`:'';
    return`<button class="bnv-btn ${t.cls} ${ST.tab===t.id?'active':''}" onclick="setTab('${t.id}')">
      ${badge}<span class="bni">${t.icon}</span><span class="bnl">${t.label}</span>
    </button>`;
  }).join('');
  return`<nav class="bnav no-print"><div class="bnav-inner">${buttons}</div></nav>`;
}
function renderDrawer(){
  const items=MORE_TABS.map(t=>`
    <div class="drawer-item ${ST.tab===t.id?'active':''}" onclick="setTabFromDrawer('${t.id}')">
      <span class="di">${t.icon}</span><span class="dl">${t.label}</span>
    </div>`).join('');
  return`<div class="more-drawer ${ST.drawerOpen?'open':''} no-print">
    <div class="drawer-handle"></div>
    <div class="drawer-grid">${items}</div>
    <div style="padding:12px 16px 4px;text-align:center">
      <button class="btn btn-ghost" style="width:100%;justify-content:center;min-height:44px" onclick="openSettings()">⚙ Configurações</button>
    </div>
    <div style="padding:6px 16px 10px">
      <button class="btn btn-del" style="width:100%;justify-content:center;min-height:44px" onclick="confirmExit()">⏻ Sair do Sistema</button>
    </div>
  </div>`;
}
function toggleDrawer(){ST.drawerOpen=!ST.drawerOpen;render()}
function closeDrawer(){ST.drawerOpen=false;render()}
function setTabFromDrawer(id){ST.tab=id;ST.drawerOpen=false;render()}
function setTab(id){ST.tab=id;ST.drawerOpen=false;render()}

// ═══ STATS ═══
function renderStats(tE,tD,saldo){
  const sc=(v,l,c)=>`<div class="stat-card"><span class="sv" style="${c?'color:'+c:''}">${v}</span><span class="sl">${l}</span></div>`;
  return`<div class="stats-row">

}

// ═══ SECTION ROUTER ═══
function renderSection(){
  switch(ST.tab){
    case'membros':return renderPeople('membros');
    case'congregados':return renderPeople('congregados');

function gerarCertificado(tipo){

  if(!form.nome?.trim()){alert('O nome é obrigatório.');return}

  const dataFmt=new Date(form.dataEvento+'T12:00:00').toLocaleDateString('pt-BR',{day:'2-digit',month:'long',year:'numeric'});
  
  const versiculo=isBatismo?
    {text:'"Portanto, fomos sepultados com ele na morte por meio do batismo, a fim de que, assim como Cristo foi ressuscitado dos mortos mediante a glória do Pai, também nós vivamos uma vida nova."',ref:'Romanos 6:4'}:
    {text:'"Então disse Jesus: Deixem vir a mim as crianças e não as impeçam; pois o Reino dos céus pertence aos que são semelhantes a elas."',ref:'Mateus 19:14'};
  
  const tituloCert=isBatismo?'CERTIFICADO DE BATISMO':'CERTIFICADO DE APRESENTAÇÃO';
  const textoCert=isBatismo?
    `Certificamos que <strong>${esc(form.nome)}</strong>${form.dataNascimento?`, nascido(a) em ${new Date(form.dataNascimento+'T12:00:00').toLocaleDateString('pt-BR',{day:'2-digit',month:'long',year:'numeric'})}`:''}, foi batizado(a) nas águas no dia <strong>${dataFmt}</strong>${form.batizadoPor?`, pelo(a) pastor(a) <strong>${esc(form.batizadoPor)}</strong>`:''}${form.local?`, em <strong>${esc(form.local)}</strong>`:''}, conforme a ordem de Nosso Senhor Jesus Cristo.`:
    `Certificamos que <strong>${esc(form.nome)}</strong>${form.dataNascimentoCrianca?`, nascido(a) em ${new Date(form.dataNascimentoCrianca+'T12:00:00').toLocaleDateString('pt-BR',{day:'2-digit',month:'long',year:'numeric'})}`:''}${form.nomePai||form.nomeMae?`, ${form.nomePai&&form.nomeMae?`filho(a) de <strong>${esc(form.nomePai)}</strong> e <strong>${esc(form.nomeMae)}</strong>`:form.nomePai?`filho(a) de <strong>${esc(form.nomePai)}</strong>`:`filho(a) de <strong>${esc(form.nomeMae)}</strong>`}`:''}, foi apresentado(a) ao Senhor no dia <strong>${dataFmt}</strong>${form.apresentadoPor?`, pelo(a) <strong>${esc(form.apresentadoPor)}</strong>`:''}${form.local?`, em <strong>${esc(form.local)}</strong>`:''}, em dedicação ao Senhor Jesus Cristo.`;
  
  const html=`<!DOCTYPE html><html lang="pt-BR"><head><meta charset="UTF-8"><title>${tituloCert}</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Great+Vibes&family=Crimson+Text:wght@400;600;700&display=swap" rel="stylesheet">

const PCFG={
  membros:{label:'Membros',icon:'✝',sing:'Membro',cols:['Nome','Telefone','E-mail','Batizado'],row:r=>[r.nome,r.telefone||'—',r.email||'—',r.batizado||'—']},
  congregados:{label:'Congregados',icon:'🕊',sing:'Congregado',cols:['Nome','Telefone','Desde'],row:r=>[r.nome,r.telefone||'—',r.dataInicio||'—']},
  obreiros:{label:'Obreiros',icon:'⚓',sing:'Obreiro',cols:['Nome','Cargo','Telefone'],row:r=>[r.nome,r.cargo||'—',r.telefone||'—']},
};
const PFIELDS={
  membros:[{k:'nome',l:'Nome Completo',req:1,full:1},{k:'telefone',l:'Telefone',t:'tel'},{k:'email',l:'E-mail',t:'email'},{k:'endereco',l:'Endereço',full:1},{k:'dataNascimento',l:'Data Nascimento',t:'date'},{k:'dataIngresso',l:'Data Ingresso',t:'date'},{k:'batizado',l:'Batizado?',t:'sel',opts:['Sim','Não']},{k:'observacoes',l:'Observações',t:'ta',full:1}],
  congregados:[{k:'nome',l:'Nome Completo',req:1,full:1},{k:'telefone',l:'Telefone',t:'tel'},{k:'email',l:'E-mail',t:'email'},{k:'endereco',l:'Endereço',full:1},{k:'dataNascimento',l:'Data Nascimento',t:'date'},{k:'dataInicio',l:'Frequenta desde',t:'date'},{k:'observacoes',l:'Observações',t:'ta',full:1}],
  obreiros:[{k:'nome',l:'Nome Completo',req:1,full:1},{k:'cargo',l:'Cargo / Função',t:'sel',opts:CARGOS},{k:'telefone',l:'Telefone',t:'tel'},{k:'email',l:'E-mail',t:'email'},{k:'endereco',l:'Endereço',full:1},{k:'dataNascimento',l:'Data Nascimento',t:'date'},{k:'dataOrdenacao',l:'Data Ordenação',t:'date'},{k:'observacoes',l:'Observações',t:'ta',full:1}],
};
function renderPeople(type){
  const cfg=PCFG[type],srch=ST.search[type]||'',data=ST[type];
  const filtered=data.filter(r=>Object.values(r).some(v=>String(v||'').toLowerCase().includes(srch.toLowerCase())));
  const rows=filtered.length===0
    ?`<tr class="empty-row"><td colspan="${cfg.cols.length+1}">Nenhum registro cadastrado ainda.</td></tr>`
    :filtered.map(r=>`<tr>
      ${cfg.row(r).map(v=>`<td>${esc(String(v))}</td>`).join('')}
      <td style="white-space:nowrap">
        <button class="btn btn-edt" onclick="openEdit('${type}','${r.id}')">✏</button>
        <button class="btn btn-del" onclick="removeRec('${type}','${r.id}')">✕</button>
      </td>
    </tr>`).join('');
  return`<div class="panel">
    <div class="panel-head">
      <span class="ptitle">${cfg.icon} ${cfg.label}<span class="cpill">${data.length}</span></span>
      <div class="toolbar">
        <input class="search-inp" placeholder="Buscar…" value="${esc(srch)}" oninput="setSearch('${type}',this.value)">
        <button class="btn btn-gold" onclick="openNew('${type}')">+ ${cfg.sing}</button>
      </div>
    </div>
    <div class="table-wrap">
      <table><thead><tr>${cfg.cols.map(c=>`<th>${c}</th>`).join('')}<th>Ações</th></tr></thead>
      <tbody>${rows}</tbody></table>
    </div>
  </div>`;
}
function setSearch(t,v){ST.search[t]=v;render()}
function openNew(type){ST.modal={type:'person',entity:type,editing:null,form:{}};render()}
function openEdit(type,id){const r=ST[type].find(x=>x.id===id);if(!r)return;ST.modal={type:'person',entity:type,editing:id,form:{...r}};render()}
function removeRec(type,id){
  if(!confirm('Remover este registro?'))return;
  if(type==='obreiros'){
    const obreiro=ST.obreiros.find(r=>r.id===id);
    if(obreiro&&obreiro.membroId){
      const membroCorrespondente=ST.membros.find(m=>m.id===obreiro.membroId);
      if(membroCorrespondente&&confirm('Este obreiro foi automaticamente cadastrado como membro. Deseja remover também o registro de membro correspondente?')){
        ST.membros=ST.membros.filter(m=>m.id!==obreiro.membroId);
      }
    }
  }
  ST[type]=ST[type].filter(r=>r.id!==id);
  autoSave(type,'Registro removido ✓');
  if(type==='obreiros')autoSave('membros','Registro de membro removido ✓');
  render();
}

function saveRec(){
  const{entity,editing,form}=ST.modal;
  if(!form.nome?.trim()){alert('Nome é obrigatório.');return}
  if(editing){
    ST[entity]=ST[entity].map(r=>r.id===editing?{...form,id:editing}:r);
    if(entity==='obreiros'){
      const obreiro=ST.obreiros.find(r=>r.id===editing);
      if(obreiro&&obreiro.membroId){
        const membroData={
          id:obreiro.membroId,nome:form.nome,telefone:form.telefone||'',
          email:form.email||'',endereco:form.endereco||'',
          dataNascimento:form.dataNascimento||'',batizado:'—',
          observacoes:`Obreiro(a) - ${form.cargo||'—'}`
        };
        ST.membros=ST.membros.map(m=>m.id===obreiro.membroId?membroData:m);
        autoSave('membros','Membro atualizado ✓');
      }
    }
  }else{
    const newId=uid();
    if(entity==='obreiros'){
      const membroId=uid();
      const membroData={
        id:membroId,nome:form.nome,telefone:form.telefone||'',
        email:form.email||'',endereco:form.endereco||'',
        dataNascimento:form.dataNascimento||'',dataIngresso:hoje(),
        batizado:'—',observacoes:`Obreiro(a) - ${form.cargo||'—'}`
      };
      ST.membros=[...ST.membros,membroData];
      ST.obreiros=[...ST.obreiros,{...form,id:newId,membroId}];
      autoSave('obreiros','Obreiro cadastrado ✓');
      autoSave('membros','Membro criado automaticamente ✓');

    }else{

    }
  }
  ST.modal=null;render();
}

function getAllPeopleForSelect(){
  const allPeople=[];
  ST.membros.forEach(m=>allPeople.push({id:m.id,nome:m.nome,tipo:'Membro'}));
  ST.congregados.forEach(c=>{
    if(!ST.membros.some(m=>m.nome===c.nome&&m.telefone===c.telefone))
      allPeople.push({id:c.id,nome:c.nome,tipo:'Congregado'});
  });
  ST.obreiros.forEach(o=>{

}

  if(tipo==='anual')return arr.filter(r=>r.data&&parseInt(r.data.split('-')[0],10)===ano);
  return arr;
}

<body><div class="doc">
<div class="hd">
  <div class="lrow">${logoTag}<div><div class="ch">${NOME_IGREJA}</div><div class="sb">Sistema de Gestão da Igreja</div></div></div>

  <div class="pr">Período: <strong>${pl}</strong></div>
</div>

  <div class="sc"><span class="sv pd">${brl(tOf)}</span><span class="sl">Ofertas</span></div>

${ents.length===0?`<div class="emp">Nenhuma entrada no período.</div>`:`<table><thead><tr><th>Data</th><th>Tipo</th><th>Membro</th><th>Descrição</th><th style="text-align:right">Valor</th></tr></thead><tbody>${entRows}<tr class="tt"><td colspan="4"><strong>TOTAL DE ENTRADAS</strong></td><td style="text-align:right;color:#2E7D32"><strong>${brl(tEnt)}</strong></td></tr></tbody></table>`}
<div class="sec">📤 Dispensas por Categoria (${disps.length} registros)</div>
${disps.length===0?`<div class="emp">Nenhuma dispensa no período.</div>`:catBlocks+`<table><thead><tr><th colspan="3">Resumo por Categoria</th><th style="text-align:right">Total</th></tr></thead><tbody>${catSumRows}<tr class="tt"><td colspan="3"><strong>TOTAL DE DISPENSAS</strong></td><td style="text-align:right;color:#C62828"><strong>${brl(tDisp)}</strong></td></tr></tbody></table>`}
<div class="sb2">
  <div class="sl2">RESULTADO — ${pl.toUpperCase()}</div>
  <div><span style="font-size:12px;color:#666;margin-right:10px">Entradas ${brl(tEnt)} − Dispensas ${brl(tDisp)} =</span><span class="sv2 ${saldo>=0?'pg':'pr2'}">${brl(saldo)}</span></div>
</div>
<div class="ft">
  <div class="fc">✝ ${NOME_IGREJA}<br><span style="font-size:10px;color:#999;font-family:Georgia,serif">Sistema de Gestão da Igreja</span></div>
  <div class="sig"><div class="sgl"></div><div class="sgt">Assinatura do Responsável / Tesoureiro(a)</div><div class="gd">Gerado em ${gen}</div></div>
</div>
</div><script>window.onload=function(){window.print()}<\/script></body></html>`;
  const w=window.open('','_blank');if(w){w.document.write(html);w.document.close()}
  else{alert('Por favor, permita pop-ups para imprimir o relatório.')}
}

// ═══ MODALS ═══
function renderModal(){
  const m=ST.modal;if(!m)return'';
  if(m.type==='person')return renderPersonModal();
  if(m.type==='entrada')return renderEntradaModal();
  if(m.type==='dispensa')return renderDispensaModal();
  if(m.type==='settings')return renderSettingsModal();
  if(m.type==='certificado')return renderCertificadoModal();
  return'';
}
function closeModal(){ST.modal=null;render()}
function mw(title,body){
  return`<div class="modal-backdrop" onclick="if(event.target===this)closeModal()">
    <div class="modal">
      <div class="modal-handle"></div>
      <div class="modal-head"><h2>${title}</h2>
        <button class="modal-close" onclick="closeModal()">✕</button>
      </div>
      <div class="modal-body">${body}</div>
    </div>
  </div>`;
}

// ── Person modal ──
const PSING={membros:'Membro',congregados:'Congregado',obreiros:'Obreiro'};
function renderPersonModal(){
  const{entity,editing,form}=ST.modal;const fields=PFIELDS[entity];
  const body=`<div class="fgrid">${fields.map(f=>`<div class="fg ${f.full?'full':''}">
    <label>${f.l}${f.req?' *':''}</label>
    ${f.t==='sel'?`<select onchange="sf('${f.k}',this.value)"><option value="">— Selecione —</option>${f.opts.map(o=>`<option value="${esc(o)}" ${form[f.k]===o?'selected':''}>${esc(o)}</option>`).join('')}</select>`
    :f.t==='ta'?`<textarea rows="3" onchange="sf('${f.k}',this.value)">${esc(form[f.k]||'')}</textarea>`
    :`<input type="${f.t||'text'}" value="${esc(form[f.k]||'')}" onchange="sf('${f.k}',this.value)">`}
  </div>`).join('')}</div>
  ${entity==='obreiros'?`<div style="margin-top:16px;padding:12px;background:rgba(196,154,42,.08);border:1px solid rgba(196,154,42,.2);border-radius:8px;font-size:11px;color:var(--g900);text-align:center">
    💡 ${editing?'Ao salvar, os dados do membro correspondente também serão atualizados.':'Este obreiro também será automaticamente cadastrado como membro.'}
  </div>`:''}
  <div class="form-actions">
    <button class="btn btn-ghost" onclick="closeModal()">Cancelar</button>
    <button class="btn btn-gold" onclick="saveRec()">${editing?'Salvar':'Cadastrar'}</button>
  </div>`;
  return mw(`${editing?'Editar':'Novo'} ${PSING[entity]}`,body);
}

// ── Entrada modal ──
function renderEntradaModal(){
  const{editing,form}=ST.modal;
  const allPeople=getAllPeopleForSelect();
  const body=`<div class="fgrid">
    <div class="fg"><label>Tipo *</label><select onchange="sf('tipo',this.value)">
      <option value="Dízimo" ${form.tipo==='Dízimo'?'selected':''}>Dízimo</option>
      <option value="Oferta" ${form.tipo==='Oferta'?'selected':''}>Oferta</option>
    </select></div>
    <div class="fg"><label>Data *</label><input type="date" value="${form.data||''}" onchange="sf('data',this.value)"></div>
    <div class="fg"><label>Valor (R$) *</label><input type="number" inputmode="decimal" step="0.01" min="0" value="${form.valor||''}" onchange="sf('valor',this.value)" placeholder="0,00"></div>
    <div class="fg full"><label>Pessoa (Membro/Congregado/Obreiro)</label>
      <select onchange="handleMembroSelect(this.value)">
        <option value="">— Selecione —</option>
        ${allPeople.map(p=>{const value=`${p.nome}|||${p.tipo}`;const currentValue=form.membro&&form.tipoPessoa?`${form.membro}|||${form.tipoPessoa}`:'';return`<option value="${esc(value)}" ${currentValue===value?'selected':''}>${esc(p.nome)} (${p.tipo})</option>`;}).join('')}
        ${!allPeople.some(p=>(form.membro&&form.tipoPessoa)?`${p.nome}|||${p.tipo}`===`${form.membro}|||${form.tipoPessoa}`:false)&&form.membro?`<option value="${esc(form.membro)}|||${esc(form.tipoPessoa||'—')}" selected>${esc(form.membro)} (${esc(form.tipoPessoa||'—')})</option>`:''}
      </select>
    </div>
    <div class="fg full"><label>Descrição</label><input type="text" value="${esc(form.descricao||'')}" onchange="sf('descricao',this.value)" placeholder="Opcional…"></div>
  </div>
  <div class="form-actions">
    <button class="btn btn-ghost" onclick="closeModal()">Cancelar</button>
    <button class="btn btn-gold" onclick="saveEntrada()">${editing?'Salvar':'Lançar'}</button>
  </div>`;
  return mw(editing?'Editar Lançamento':'Nova Entrada',body);
}
function handleMembroSelect(value){
  if(!value){sf('membro','');sf('tipoPessoa','')}
  else{const parts=value.split('|||');sf('membro',parts[0]);sf('tipoPessoa',parts[1]||'')}
}

// ── Dispensa modal ──
function renderDispensaModal(){
  const{editing,form}=ST.modal;
  const body=`<div class="fgrid">
    <div class="fg"><label>Categoria *</label><select onchange="sf('categoria',this.value)">
      <option value="">— Selecione —</option>
      ${CATS.map(c=>`<option value="${esc(c)}" ${form.categoria===c?'selected':''}>${esc(c)}</option>`).join('')}
    </select></div>
    <div class="fg"><label>Data *</label><input type="date" value="${form.data||''}" onchange="sf('data',this.value)"></div>
    <div class="fg"><label>Valor (R$) *</label><input type="number" inputmode="decimal" step="0.01" min="0" value="${form.valor||''}" onchange="sf('valor',this.value)" placeholder="0,00"></div>
    <div class="fg"><label>Responsável</label><input type="text" value="${esc(form.responsavel||'')}" onchange="sf('responsavel',this.value)"></div>
    <div class="fg full"><label>Descrição</label><input type="text" value="${esc(form.descricao||'')}" onchange="sf('descricao',this.value)"></div>
    <div class="fg full"><label>Nota Fiscal / Comprovante</label><input type="text" value="${esc(form.nota||'')}" onchange="sf('nota',this.value)" placeholder="Número ou referência"></div>
  </div>
  <div class="form-actions">
    <button class="btn btn-ghost" onclick="closeModal()">Cancelar</button>
    <button class="btn btn-gold" onclick="saveDispensa()">${editing?'Salvar':'Lançar'}</button>
  </div>`;
  return mw(editing?'Editar Dispensa':'Nova Dispensa',body);
}
function sf(k,v){if(ST.modal?.form)ST.modal.form[k]=v}

// ── Settings modal ──
function openSettings(){ST.modal={type:'settings',msg:null};render()}
function renderSettingsModal(){
  const c=ls('igr-credentials')||{usuario:'admin',senha:'1234'};
  const{msg}=ST.modal;
  const fb=msg?`<div class="${msg.ok?'fb-ok':'fb-err'}">${msg.text}</div>`:'';
  const body=`
  <div style="margin-bottom:20px">
    <div class="stt">Logo da Igreja</div>
    <div class="logo-drop ${ST.logo?'has':''}" onclick="document.getElementById('sett-logo').click()">
      ${ST.logo?`<img src="${ST.logo}" alt="Logo">`:'<div style="font-size:40px;opacity:.3">🖼</div>'}
      <span class="logo-lbl">${ST.logo?'Toque para trocar o logo':'Toque para carregar o logo'}</span>
      <span class="logo-hint">PNG ou JPG — recomendado 200×200px</span>
    </div>
    <input id="sett-logo" type="file" accept="image/*" style="display:none" onchange="handleLogoSett(this)">
    ${ST.logo?`<div style="margin-top:8px"><button class="btn btn-del" style="min-height:40px" onclick="removeLogo()">✕ Remover logo</button></div>`:''}
  </div>
  <div style="margin-bottom:20px">
    <div class="stt">Credenciais de Acesso</div>
    <div class="fgrid">
      <div class="fg full"><label>Usuário</label><input type="text" id="s-u" value="${esc(c.usuario)}"></div>
      <div class="fg"><label>Nova Senha</label><input type="password" id="s-p" placeholder="Em branco = manter"></div>
      <div class="fg"><label>Confirmar Senha</label><input type="password" id="s-c" placeholder="Repita a senha"></div>
    </div>
    ${fb}
    <div class="form-actions"><button class="btn btn-gold" onclick="saveSettings()">💾 Salvar</button></div>
  </div>
  <div>
    <div class="stt d">Sessão</div>
    <button class="btn btn-del" style="width:100%;justify-content:center;min-height:46px;font-size:12px" onclick="confirmExit()">⏻ Sair do Sistema</button>
  </div>`;
  return mw('⚙ Configurações',body);
}
function handleLogoSett(input){
  const f=input.files[0];if(!f)return;
  const r=new FileReader();
  r.onload=ev=>{ST.logo=ev.target.result;autoSave('logo','Logo salvo ✓');render()};
  r.readAsDataURL(f);
}
function removeLogo(){
  if(!confirm('Remover o logo atual?'))return;
  ST.logo=null;ss('igr-logo',null);toast('Logo removido ✓');render();
}
function saveSettings(){
  const u=document.getElementById('s-u')?.value.trim();
  const p=document.getElementById('s-p')?.value;
  const c=document.getElementById('s-c')?.value;
  if(!u){ST.modal.msg={ok:false,text:'Usuário não pode ser vazio.'};render();return}
  if(p&&p!==c){ST.modal.msg={ok:false,text:'As senhas não coincidem.'};render();return}
  const cur=ls('igr-credentials')||{usuario:'admin',senha:'1234'};
  ss('igr-credentials',{usuario:u,senha:p||cur.senha});
  ST.modal.msg={ok:true,text:'✓ Credenciais salvas com sucesso!'};render();
}

// ═══ SERVICE WORKER (offline support) ═══
if('serviceWorker' in navigator){
  const sw=`
    const CACHE='enraizados-v2';
    const ASSETS=['.'];
    self.addEventListener('install',e=>e.waitUntil(caches.open(CACHE).then(c=>c.addAll(ASSETS))));
    self.addEventListener('fetch',e=>e.respondWith(caches.match(e.request).then(r=>r||fetch(e.request).catch(()=>caches.match('.')))));
  `;
  const blob=new Blob([sw],{type:'application/javascript'});
  navigator.serviceWorker.register(URL.createObjectURL(blob)).catch(()=>{});
}

// ═══ BOOT ═══
render();
</script>
</body>
</html>
